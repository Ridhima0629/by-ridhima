<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | By Ridhima</title>

<style>

body{
    margin:0;
    font-family:Georgia, serif;
    background:#fff7fb;
}

header{
    background:#ff5ca8;
    color:white;
    text-align:center;
    padding:25px;
}

h1{
    margin:0;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
    color:#ff5ca8;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#ff5ca8;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ff2d8f;
}

</style>

</head>

<body>

<header>

<h1>By Ridhima Admin Dashboard</h1>

</header>

<div class="container">

<div class="card">

<h2>Add / Edit Bracelet</h2>

<label>Bracelet Name</label>
<input type="text" placeholder="Pink Hope Bracelet">

<label>Price</label>
<input type="text" placeholder="$12.00">

<label>Image</label>
<input type="file">

<br><br>

<button>Save Bracelet</button>

</div>

<div class="card">

<h2>Website Statistics</h2>

<p>Orders: Coming Soon</p>

<p>Revenue: Coming Soon</p>

<p>Messages: Coming Soon</p>

</div>

</div>

</body>
</html>
